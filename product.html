<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商品详情 - 萌宠之家</title>
  <meta name="description" content="查看商品详细信息">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#3A6347',
            secondary: '#D4A373',
            accent: '#C44536',
            background: '#FEFAE0',
            text: '#283618',
          },
          fontFamily: {
            heading: ['Fredoka', 'sans-serif'],
            body: ['"Plus Jakarta Sans"', 'sans-serif'],
          },
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    h1, h2, h3, h4, h5, h6 { font-family: 'Fredoka', sans-serif; }
  </style>
</head>
<body class="bg-background text-text min-h-screen flex flex-col">
  <nav class="bg-primary text-white shadow-md">
    <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" class="w-10 h-10">
          <path d="M20 45 V85 C20 87.761 22.239 90 25 90 H75 C77.761 90 80 87.761 80 85 V45" fill="#D4A373"/>
          <path d="M10 50 L50 15 L90 50" stroke="#3A6347" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <g fill="#C44536">
            <path d="M50 75 C42 75 38 68 38 62 C38 55 44 52 50 52 C56 52 62 55 62 62 C62 68 58 75 50 75 Z"/>
            <circle cx="35" cy="50" r="6"/>
            <circle cx="43" cy="40" r="6"/>
            <circle cx="57" cy="40" r="6"/>
            <circle cx="65" cy="50" r="6"/>
          </g>
        </svg>
        <span class="text-xl font-heading font-bold">萌宠之家</span>
      </a>
      <div class="flex gap-6 font-medium">
        <a href="products.html" class="hover:text-secondary transition-colors">商品目录</a>
        <a href="about.html" class="hover:text-secondary transition-colors">关于我们</a>
      </div>
    </div>
  </nav>

  <main class="flex-grow">
    <section class="py-12 px-4">
      <div class="max-w-6xl mx-auto">
        <a href="products.html" class="inline-flex items-center text-primary hover:text-primary/80 mb-6 font-medium">← 返回商品目录</a>

        <div id="product-detail">
          

        <div id="related-products" class="mt-12">
          <h2 class="text-2xl font-bold text-text mb-6">相关商品</h2>
          <div id="related-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="bg-text text-white py-8 px-4 mt-auto">
    <div class="max-w-6xl mx-auto text-center">
      <p>&copy; 2024 萌宠之家. 保留所有权利.</p>
    </div>
  </footer>

  <script src="products.js"></script>
  <script>
    const categoryMap = {
      food: '食品',
      toys: '玩具',
      accessories: '配件',
      health: '健康',
    };

    const urlParams = new URLSearchParams(window.location.search);
    const productId = parseInt(urlParams.get('id'));
    const product = products.find(p => p.id === productId);

    if (!product) {
      document.getElementById('product-detail').innerHTML = '<p class="text-center text-text/70 py-12">商品未找到</p>';
    } else {
      document.title = `${product.name_zh} - 萌宠之家`;

      document.getElementById('product-detail').innerHTML = `
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-12">
          <div class="aspect-square bg-gray-200 rounded-xl flex items-center justify-center">
            <span class="text-gray-400">商品图片</span>
          </div>
          <div>
            <div class="inline-block px-3 py-1 rounded-full text-sm font-medium bg-secondary/20 text-secondary mb-3">
              ${categoryMap[product.category] || product.category}
            </div>
            <h1 class="text-3xl md:text-4xl font-bold text-text mb-4">${product.name_zh}</h1>
            <p class="text-4xl font-bold text-accent mb-6">¥${product.price}</p>
            <div>
              <p class="text-text/80 leading-relaxed text-lg">${product.description_zh}</p>
            </div>
          </div>
        </div>
      `;

      const related = products.filter(p => p.category === product.category && p.id !== product.id).slice(0, 3);

      if (related.length > 0) {
        document.getElementById('related-grid').innerHTML = related.map(p => `
          <a href="product.html?id=${p.id}" class="group">
            <div class="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-xl transition-shadow duration-300">
              <div class="aspect-square bg-gray-200 flex items-center justify-center">
                <span class="text-gray-400 text-sm">商品图片</span>
              </div>
              <div class="p-4">
                <h3 class="font-semibold text-lg mb-2 text-text group-hover:text-primary transition-colors">${p.name_zh}</h3>
                <p class="text-2xl font-bold text-accent">¥${p.price}</p>
              </div>
            </div>
          </a>
        `).join('');
      } else {
        document.getElementById('related-products').style.display = 'none';
      }
    }
  </script>
</body>
</html>
